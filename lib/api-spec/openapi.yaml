openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CRM API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: customers
    description: Customer operations
  - name: orders
    description: Order operations
  - name: notes
    description: Note operations
  - name: dashboard
    description: Dashboard summary operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, paid, shipped]
        - name: customer_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Delete an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List notes for a customer
      parameters:
        - name: customer_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /notes/{id}:
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [dashboard]
      summary: Get recent orders
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /dashboard/order-status-breakdown:
    get:
      operationId: getOrderStatusBreakdown
      tags: [dashboard]
      summary: Get order counts by status
      responses:
        "200":
          description: Breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderStatusBreakdown"

  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List all companies
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get a company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List all leads
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Not found
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /ai/lead-score:
    post:
      operationId: generateLeadScore
      tags: [ai]
      summary: Generate a score for a lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadScoreInput"
      responses:
        "200":
          description: Lead score generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  score:
                    type: number
                  explanation:
                    type: string

  /ai/email-draft:
    post:
      operationId: generateEmailDraft
      tags: [ai]
      summary: Draft an email to a lead or customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailDraftInput"
      responses:
        "200":
          description: Email drafted
          content:
            application/json:
              schema:
                type: object
                properties:
                  draft:
                    type: string

  /ai/meeting-summary:
    post:
      operationId: generateMeetingSummary
      tags: [ai]
      summary: Summarize meeting notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingSummaryInput"
      responses:
        "200":
          description: Meeting summarized
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: string

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get advanced analytics summary
      responses:
        "200":
          description: Analytics summary retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  mrr:
                    type: number
                  pipelineValue:
                    type: number
                  winRate:
                    type: number

  /workflows:
    get:
      operationId: listWorkflows
      tags: [workflows]
      summary: Get all workflows
      responses:
        "200":
          description: A list of workflows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workflow"
    post:
      operationId: createWorkflow
      tags: [workflows]
      summary: Create a new workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowInput"
      responses:
        "200":
          description: Workflow created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"

components:
  schemas:
    Workflow:
      type: object
      required: [id, name, triggerEvent, actions]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        triggerEvent:
          type: string
        triggerConditions:
          type: object
        actions:
          type: array
          items:
            type: object
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    WorkflowInput:
      type: object
      required: [name, triggerEvent, actions]
      properties:
        name:
          type: string
        description:
          type: string
        triggerEvent:
          type: string
        triggerConditions:
          type: object
        actions:
          type: array
          items:
            type: object
        isActive:
          type: boolean
    LeadScoreInput:
      type: object
      required: [leadData]
      properties:
        leadData:
          type: object
    EmailDraftInput:
      type: object
      required: [recipientName, purpose]
      properties:
        recipientName:
          type: string
        purpose:
          type: string
        additionalInfo:
          type: string
    MeetingSummaryInput:
      type: object
      required: [meetingNotes]
      properties:
        meetingNotes:
          type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Customer:
      type: object
      required: [id, name, email, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        created_at:
          type: string

    CustomerInput:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        phone:
          type: string

    CustomerUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        phone:
          type: ["string", "null"]

    Order:
      type: object
      required: [id, customer_id, product_name, amount, status, created_at]
      properties:
        id:
          type: string
        customer_id:
          type: string
        product_name:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [pending, paid, shipped]
        created_at:
          type: string
        customer_name:
          type: ["string", "null"]

    OrderInput:
      type: object
      required: [customer_id, product_name, amount]
      properties:
        customer_id:
          type: string
        product_name:
          type: string
          minLength: 1
        amount:
          type: number
        status:
          type: string
          enum: [pending, paid, shipped]

    OrderUpdate:
      type: object
      properties:
        product_name:
          type: string
          minLength: 1
        amount:
          type: number
        status:
          type: string
          enum: [pending, paid, shipped]

    Note:
      type: object
      required: [id, customer_id, text, created_at]
      properties:
        id:
          type: string
        customer_id:
          type: string
        text:
          type: string
        created_at:
          type: string

    NoteInput:
      type: object
      required: [customer_id, text]
      properties:
        customer_id:
          type: string
        text:
          type: string
          minLength: 1

    DashboardSummary:
      type: object
      required: [total_customers, total_orders, total_revenue, new_customers_this_month]
      properties:
        total_customers:
          type: integer
        total_orders:
          type: integer
        total_revenue:
          type: number
        new_customers_this_month:
          type: integer

    OrderStatusBreakdown:
      type: object
      required: [pending, paid, shipped]
      properties:
        pending:
          type: integer
        paid:
          type: integer
        shipped:
          type: integer

    Company:
      type: object
      required: [id, name, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        domain:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        created_at:
          type: string

    CompanyInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        domain:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]

    Lead:
      type: object
      required: [id, name, email, status, created_at]
      properties:
        id:
          type: string
        company_id:
          type: ["string", "null"]
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        status:
          type: string
        ai_score:
          type: ["integer", "null"]
        created_at:
          type: string

    LeadInput:
      type: object
      required: [name, email]
      properties:
        company_id:
          type: ["string", "null"]
        name:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        phone:
          type: ["string", "null"]
        status:
          type: string

    Task:
      type: object
      required: [id, title, status, created_at]
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        due_date:
          type: ["string", "null"]
        status:
          type: string
        related_lead_id:
          type: ["string", "null"]
        related_customer_id:
          type: ["string", "null"]
        assigned_to:
          type: ["string", "null"]
        created_at:
          type: string

    TaskInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        due_date:
          type: ["string", "null"]
        status:
          type: string
        related_lead_id:
          type: ["string", "null"]
        related_customer_id:
          type: ["string", "null"]
        assigned_to:
          type: ["string", "null"]
